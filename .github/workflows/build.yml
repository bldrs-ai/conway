name: CI

on:
  pull_request:
    types: [opened, synchronize]
    # Skip the heavy build + IFC regression on doc-only PRs. paths-ignore
    # skips the workflow only when EVERY changed file matches — a PR that
    # also touches code/config still runs the full suite. Push-to-main
    # (auto-publish, perf) is intentionally left unfiltered below.
    # NOTE: if `build` / `run-ifc-regression` are *required* status checks
    # in branch protection, a path-skipped run reports nothing and the PR
    # waits forever — switch to a per-job `if:` gate instead (a skipped-by-if
    # job satisfies a required check; a path-skipped workflow does not).
    paths-ignore:
      - '**/*.md'
      - 'design/**'
      - 'docs/**'
  push:
    branches: [main]
  # Manual runs from any branch (Actions > CI > Run workflow) so the
  # perf jobs — normally push-to-main only — can be exercised and debugged
  # on a branch without merging. auto-publish stays push:main-only.
  workflow_dispatch:

env:
  EMSDK_VERSION: '3.1.72'
  EMSDK_CACHE_FOLDER: 'cache/emsdk'
  # Public test-models git ref to track. Resolved to a concrete commit SHA per
  # run (recorded in the PR comment + job summary) so the regression baseline is
  # reproducible without test-models having to cut tags. Override via the
  # repo/environment variable TEST_MODELS_REF (a branch, tag, or full commit SHA).
  TEST_MODELS_REF: ${{ vars.TEST_MODELS_REF || 'main' }}

jobs:
  build:
    # Heavy runner matches ifc-regression. The WASM toolchain (genie +
    # emcc) needs the headroom; the default 2-vCPU runner fails the compile.
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Compute conway-geom submodule SHA
        id: subsha
        run: echo "sha=$(git -C dependencies/conway-geom rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # The compat/web-ifc constant tables are generated from the web-ifc
      # devDependency (scripts/gen-web-ifc-types.cjs). Regenerate and fail if
      # the committed files drift — catches a web-ifc bump that forgot
      # `yarn gen-web-ifc-types`, or a hand-edit of a generated file. Pure
      # JS + web-ifc, so it runs right after install (no WASM/build needed).
      - name: Check web-ifc tables are up to date
        run: |
          yarn gen-web-ifc-types
          git diff --exit-code -- src/compat/web-ifc/ifc2x4.ts src/compat/web-ifc/types-map.ts \
            || { echo "::error::Generated web-ifc tables are stale. Run 'yarn gen-web-ifc-types' and commit the result."; exit 1; }

      # --- WASM cache: keyed on conway-geom submodule SHA + EMSDK version.
      # On hit, the heavy WASM build (GENie + EMSDK + emcc) is skipped entirely.
      # The regression job depends on this job and consumes the same cache.
      - name: Restore WASM build cache
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            dependencies/conway-geom/Dist
            dependencies/conway-geom/bin/release
            compiled/dependencies/conway-geom/Dist
          key: wasm-${{ runner.os }}-emsdk${{ env.EMSDK_VERSION }}-${{ steps.subsha.outputs.sha }}

      # --- GENie + EMSDK setup (skipped on WASM cache hit)
      - name: Restore GENie cache
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        id: genie-cache
        uses: actions/cache@v4
        with:
          path: bin/linux/genie
          key: genie-${{ runner.os }}

      - name: Build GENie
        if: steps.wasm-cache.outputs.cache-hit != 'true' && steps.genie-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/bkaradzic/GENie.git GENie
          (cd GENie && make)
          mkdir -p bin/linux
          cp GENie/bin/linux/genie bin/linux/genie

      - name: Cache Emscripten system libraries
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.EMSDK_CACHE_FOLDER }}
          key: ${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Install Emscripten
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: ${{ env.EMSDK_CACHE_FOLDER }}

      - name: Export EMSDK paths for subsequent steps
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          which em++
          em++ -v
          EMSDK=$(which em++ | sed 's|upstream/emscripten/em++||')
          EMSCRIPTEN=$(which em++ | sed 's|/em++||')
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EMSCRIPTEN=$EMSCRIPTEN" >> "$GITHUB_ENV"

      - name: Extract WASM build dependencies
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: yarn extract-wasm-dependencies

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: yarn build-GHA-all

      # tsc --build always runs from scratch here. Earlier we cached
      # compiled/src + compiled/examples + tsbuildinfo, but that subset
      # left compiled/dependencies/conway-geom/index.js missing — the
      # buildinfo claimed everything was up to date and tsc skipped
      # recompiling the conway-geom shim, so the test runner couldn't
      # resolve '../../dependencies/conway-geom/index.js'. A correct TS
      # cache strategy can come back as a separate iteration.
      - name: TypeScript build (incremental)
        run: yarn build-incremental

      - name: Test
        run: yarn test

      - name: Lint
        run: yarn lint

      # --- Tier A: in-repo quick-check geometry goldens (data/ models) ---
      # A hermetic geometry gate that runs in `build` (no test-models clone, no
      # token) so it protects every PR including forks. Each data/ model's digest
      # is compared against a committed golden (data/<name>.csv):
      #   - golden present & matches -> pass
      #   - golden present & differs -> FAIL with a re-bless hint (the gate)
      #   - golden absent            -> warn + emit candidate, exit 0 (bootstrap)
      # Goldens must be produced by CI's pinned EMSDK toolchain to match, so the
      # first run uploads the candidate digests as an artifact; committing them
      # to data/ turns the gate on. Uses the same `ifc_regression_main.js -d`
      # the batch job spawns, so the digest format is identical, and WASM is
      # already loadable here (the jest `yarn test` step above exercises it via
      # the same conway-geom import).
      - name: Tier A quick-check geometry goldens (data/)
        run: |
          set -uo pipefail
          OUT="${GITHUB_WORKSPACE}/tierA-goldens"
          mkdir -p "$OUT"
          shopt -s nullglob
          status=0
          count=0
          # Cover every in-repo quick-check model; deriving the list from
          # data/*.ifc (vs a hard-coded set) means a newly added model is gated
          # as soon as its golden is committed, with no edit here.
          for f in data/*.ifc; do
            count=$((count + 1))
            m=$(basename "$f" .ifc)
            node --experimental-specifier-resolution=node \
              ./compiled/src/ifc/ifc_regression_main.js -d "$f" "$OUT/$m"
            cand="$OUT/$m.csv"
            golden="data/$m.csv"
            if [ ! -f "$cand" ]; then
              echo "::error::No digest produced for $f -- parsing or geometry extraction likely failed for this model (see log above)."
              status=1; continue
            fi
            if [ ! -f "$golden" ]; then
              echo "::warning::No golden for $f yet -- download the tierA-goldens artifact and commit $m.csv to data/$m.csv to enable gating."
              continue
            fi
            if diff -u "$golden" "$cand"; then
              echo "$f: geometry digest matches golden."
            else
              echo "::error::Geometry digest changed for $f. If intended, re-bless: replace data/$m.csv with $m.csv from this run's tierA-goldens artifact."
              status=1
            fi
          done
          if [ "$count" -eq 0 ]; then
            echo "::error::No data/*.ifc quick-check models found."
            status=1
          fi
          exit $status

      - name: Upload Tier A digest candidates
        if: ${{ always() && hashFiles('tierA-goldens/*.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tierA-goldens-${{ github.run_id }}
          path: tierA-goldens/*.csv

  # ---------------------------------------------------------------------------
  # Regression: consumes build's WASM cache (no rebuild). Posts results to PR.
  # Kept on a separate job (vs steps in build) so its 5-10 min runtime doesn't
  # block the build-job status from showing once the fast feedback finishes.
  # ---------------------------------------------------------------------------
  run-ifc-regression:
    needs: build
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    # Expose the packed tarball name so downstream perf jobs can download the
    # artifact by name without re-packing conway.
    outputs:
      package_tgz: ${{ steps.npm_pack.outputs.package_tgz }}
      # Resolved test-models commit SHA, so perf-three-public pins the exact
      # same model set this job diffed against.
      test_models_sha: ${{ steps.tmsha.outputs.sha }}
    steps:
      - name: Checkout Conway Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Compute conway-geom submodule SHA
        id: subsha
        run: echo "sha=$(git -C dependencies/conway-geom rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Build job populated this cache. We expect a hit; if not, fail fast
      # rather than silently rebuilding WASM and confusing the timing model.
      - name: Restore WASM build cache (populated by build)
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            dependencies/conway-geom/Dist
            dependencies/conway-geom/bin/release
            compiled/dependencies/conway-geom/Dist
          key: wasm-${{ runner.os }}-emsdk${{ env.EMSDK_VERSION }}-${{ steps.subsha.outputs.sha }}

      - name: Fail if WASM cache miss
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::WASM cache miss in regression job; build should have populated it."
          exit 1

      - name: TypeScript build
        run: yarn build-incremental

      # Bump the minor version so the artifact tarball has a unique name
      # distinct from the released package (matches prior workflow behavior).
      - name: Bump minor for artifact naming
        run: yarn bumpMinor

      - name: Bundle examples
        run: yarn bundle-examples

      # --- Test Models Checkout & Regression ---
      # Resolve the tracked ref to a concrete commit SHA. Recording the SHA (not
      # a tag) is what makes the baseline reproducible: test-models doesn't tag
      # reliably, so we track its main branch and pin per-run to the commit we
      # actually tested. The SHA keys the cache and is the git-diff target below.
      - name: Resolve test-models SHA
        id: tmsha
        run: |
          set -euo pipefail
          URL=https://github.com/bldrs-ai/test-models.git
          # Run ls-remote as its own command (errexit) so a transient network
          # failure aborts the job loudly instead of being masked by the head/cut
          # pipeline and silently falling back to a moving ref. Annotated tags
          # advertise a peeled "<ref>^{}" commit line, which we prefer over the
          # tag-object id.
          REFS=$(git ls-remote "$URL" "$TEST_MODELS_REF")
          SHA=$(printf '%s\n' "$REFS" | awk '$2 ~ /\^\{\}$/ { print $1; found=1; exit } NR==1 { first=$1 } END { if (!found && first) print first }')
          # No advertised match -> TEST_MODELS_REF is itself a raw commit SHA.
          if [ -z "$SHA" ]; then SHA="$TEST_MODELS_REF"; fi
          # Refuse anything that is not a 40-hex commit SHA rather than poisoning
          # the cache key and git-diff target with a moving or bogus ref.
          if ! [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve TEST_MODELS_REF='$TEST_MODELS_REF' to a commit SHA (got '$SHA'). Use an existing branch, tag, or full 40-char commit SHA."
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved test-models ref '$TEST_MODELS_REF' -> $SHA"
          echo "**Models:** test-models @ \`$SHA\` (ref \`$TEST_MODELS_REF\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: Restore Test Models Cache
        id: cache-test-models
        uses: actions/cache@v4
        with:
          path: test-models
          key: ${{ runner.os }}-test-models-${{ steps.tmsha.outputs.sha }}

      - name: Checkout Test Models Repo if Not Cached
        if: steps.cache-test-models.outputs.cache-hit != 'true'
        run: |
          SHA="${{ steps.tmsha.outputs.sha }}"
          # Shallow-fetch exactly the resolved commit (GitHub allows fetch-by-SHA
          # for reachable commits) so the working tree and git-diff target match
          # the SHA we recorded, even if main advanced since we resolved it.
          git init test-models
          git -C test-models remote add origin https://github.com/bldrs-ai/test-models.git
          git -C test-models fetch --depth 1 origin "$SHA"
          git -C test-models checkout "$SHA"

      # Perf CSV lands OUTSIDE the diffed test_models folder so machine-specific
      # timings don't show up as "changes" against test-models's checked-in
      # baselines. The aggregate is uploaded as a workflow artifact below and
      # summarised in the PR comment.
      - name: Run IFC Regression Batch Script
        run: |
          node --experimental-specifier-resolution=node ./compiled/src/ifc/ifc_regression_batch_main.js \
            -e "sp-.*\.ifc" \
            -t ${{ steps.tmsha.outputs.sha }} \
            --perf "${GITHUB_WORKSPACE}/perf.csv" \
            test-models \
            test-models/regression/test_models \
            --parallel --mem-utilization 90

      - name: Gather Regression Results
        id: regression_results
        run: |
          cd test-models/regression/test_models

          # Process failed.csv with Python CSV parsing
          if [ -f failed.csv ]; then
            FAILED_OUTPUT=$(python - <<'EOF'
          import csv
          with open('failed.csv', newline='') as csvfile:
              reader = list(csv.reader(csvfile))
          if len(reader) <= 1:
              print("No failures :white_check_mark:")
          else:
              header = reader[0]
              header_line = "| " + " | ".join(header) + " |"
              separator_line = "|" + " --- |" * len(header)
              print(header_line)
              print(separator_line)
              for row in reader[1:]:
                sanitized_row = [field.replace("\n", " ").replace("\r", " ") for field in row]
                print("| " + " | ".join(sanitized_row) + " |")
          EOF
          )
          else
            FAILED_OUTPUT="No failed.csv found."
          fi

          # Process errors.csv with Python CSV parsing
          if [ -f errors.csv ]; then
            ERRORS_OUTPUT=$(python - <<'EOF'
          import csv
          with open('errors.csv', newline='') as csvfile:
              reader = list(csv.reader(csvfile))
          if len(reader) <= 1:
              print("No errors found.")
          else:
              header = reader[0]
              header_line = "| " + " | ".join(header) + " |"
              separator_line = "|" + " --- |" * len(header)
              print(header_line)
              print(separator_line)
              for row in reader[1:]:
                sanitized_row = [field.replace("\n", " ").replace("\r", " ") for field in row]
                print("| " + " | ".join(sanitized_row) + " |")
          EOF
          )
          else
            ERRORS_OUTPUT="No errors.csv found."
          fi

          echo "failed_output<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "errors_output<<EOF" >> $GITHUB_OUTPUT
          echo "$ERRORS_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Summarise the top-10 slowest models from the perf CSV. The full
          # CSV is uploaded as an artifact for finer inspection.
          PERF_CSV="${GITHUB_WORKSPACE}/perf.csv"
          if [ -f "$PERF_CSV" ]; then
            PERF_OUTPUT=$(python - "$PERF_CSV" <<'EOF'
          import csv, sys
          with open(sys.argv[1], newline='') as f:
              rows = list(csv.DictReader(f))
          if not rows:
              print("perf.csv is empty.")
          else:
              top_n = 10
              def total(r):
                  try: return int(r.get('totalTimeMs','0') or 0)
                  except ValueError: return 0
              rows.sort(key=total, reverse=True)
              header = ['file','status','parseTimeMs','geometryTimeMs','totalTimeMs','rssMb','heapUsedMb']
              print("| " + " | ".join(header) + " |")
              print("|" + " --- |" * len(header))
              for r in rows[:top_n]:
                  print("| " + " | ".join(r.get(h,'') for h in header) + " |")
              print("")
              print(f"_Showing top {min(top_n,len(rows))} of {len(rows)} models by totalTimeMs. Full CSV in the run artifacts._")
          EOF
          )
          else
            PERF_OUTPUT="perf.csv not produced."
          fi

          echo "perf_output<<EOF" >> $GITHUB_OUTPUT
          echo "$PERF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create NPM Package
        id: npm_pack
        run: |
          PACKAGE_TGZ=$(npm pack 2>&1 | grep "filename:" | sed 's/.*filename: //')
          echo "PACKAGE_TGZ=${PACKAGE_TGZ}" >> $GITHUB_ENV
          echo "package_tgz=${PACKAGE_TGZ}" >> $GITHUB_OUTPUT

      - name: Upload NPM Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.npm_pack.outputs.package_tgz }}
          path: ${{ steps.npm_pack.outputs.package_tgz }}

      - name: Upload perf.csv artifact
        if: ${{ hashFiles('perf.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ github.run_id }}
          path: perf.csv

      - name: Comment on Pull Request with Regression Results and NPM Package Artifact
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Regression Results (IFC + STEP)

            **Models:** `test-models` @ `${{ steps.tmsha.outputs.sha }}` (ref `${{ env.TEST_MODELS_REF }}`)

            **Failed.csv:**
            ${{ steps.regression_results.outputs.failed_output }}

            **Errors.csv:**
            ${{ steps.regression_results.outputs.errors_output }}

            **Performance (top 10 by totalTimeMs):**
            ${{ steps.regression_results.outputs.perf_output }}

            **NPM Package Artifact:**
            The package **${{ steps.npm_pack.outputs.package_tgz }}** was generated.
            Download it from [this run's artifacts page](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            (look for the artifact named **${{ steps.npm_pack.outputs.package_tgz }}**).

  # ---------------------------------------------------------------------------
  # Headless-three perf benchmark (public models).
  #
  # Runs scripts/benchmark.cjs against bldrs-ai/test-models (public) using the
  # candidate conway tarball produced by run-ifc-regression. The adapter
  # (@bldrs-ai/conway-web-ifc-adapter) ships unbundled — it does runtime
  # `import '@bldrs-ai/conway'` — so a yarn `resolutions` override in H3's
  # package.json forces the entire chain (H3 → adapter → conway) onto our
  # candidate without rebuilding the adapter.
  #
  # Info-only: results are posted as a PR comment for visibility. Future
  # iterations will diff perf vs a golden baseline and may gate on it.
  # ---------------------------------------------------------------------------
  perf-three-public:
    needs: run-ifc-regression
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' || github.head_ref == 'claude/fix-perf-three-gl'  # TEMP: validate perf jobs on this PR; revert before merge
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    # Full set locally takes ~10 min; H3 build + clone adds ~5-10 min. Cap at
    # 60 to bound runner-minute cost on a hung benchmark.
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      actions: read    # required by download-artifact@v4 to fetch from prior runs
    env:
      # Pinned to a SHA so perf is reproducible. Override via repo variable
      # `H3_SHA` when bumping the H3 baseline.
      H3_SHA: ${{ vars.H3_SHA || '76f9ab686e08e58e7fe798e6a11ed0ad52b38c4b' }}
    steps:
      - name: Checkout conway (for scripts/benchmark.cjs)
        uses: actions/checkout@v4
        with:
          # No submodules — perf doesn't build conway, it consumes the tarball.
          submodules: false
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download conway candidate tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-ifc-regression.outputs.package_tgz }}
          path: artifacts

      - name: Clone headless-three at pinned SHA
        run: |
          git clone https://github.com/bldrs-ai/headless-three.git h3
          git -C h3 checkout "$H3_SHA"

      - name: Override conway via yarn resolutions
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          test -f "$CANDIDATE_TGZ" || { echo "::error::Candidate tarball missing: $CANDIDATE_TGZ"; exit 1; }
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('h3/package.json', 'utf8'));
            p.resolutions = Object.assign({}, p.resolutions, { '@bldrs-ai/conway': 'file:' + process.env.CANDIDATE_TGZ });
            fs.writeFileSync('h3/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install H3 + build
        working-directory: h3
        run: |
          yarn install
          yarn build
          # The bundled server resolves the conway wasm from <cwd>/Dist at
          # runtime; without this every render 500s with ERR_MODULE_NOT_FOUND.
          ln -sfn node_modules/@bldrs-ai/conway/compiled/dependencies/conway-geom/Dist Dist

      # Safety check: if the resolutions override didn't take effect, H3 would
      # silently benchmark whatever conway version its lockfile pins instead of
      # our candidate. Compare the version in node_modules against the version
      # baked into the candidate tarball's package.json.
      - name: Verify candidate conway is resolved in H3
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          EXPECTED=$(tar -xzOf "$CANDIDATE_TGZ" package/package.json | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>console.log(JSON.parse(s).version))")
          ACTUAL=$(node -p "require('./h3/node_modules/@bldrs-ai/conway/package.json').version")
          echo "Expected conway: $EXPECTED"
          echo "Actual conway:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::yarn resolutions override did not take effect. Expected '$EXPECTED', got '$ACTUAL'."
            exit 1
          fi

      # headless-gl (the `gl` package H3 renders through) needs an X/GLX
      # display plus the GL libraries H3's own Dockerfile installs
      # (libxi/libGLU/GLEW); with only xvfb the server can die at startup
      # and every render fails.
      - name: Install Xvfb + GL libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q xvfb pkg-config build-essential \
            libxi-dev libglu1-mesa-dev libglew-dev

      # Prove the `gl` native module can actually create a context on this
      # runner before spending minutes benchmarking. The npm prebuilt binary
      # is built on a different image; if it can't initialize here, rebuild
      # it from source against this runner's libraries and re-verify.
      - name: GL smoke test (rebuild gl from source if prebuilt is broken)
        working-directory: h3
        run: |
          SMOKE='const gl=require("gl")(8,8); if(!gl){throw new Error("gl context creation returned null")}; console.log("gl OK:", gl.getParameter(gl.VERSION))'
          if ! xvfb-run -a --server-args="-screen 0 1024x768x24 +extension GLX +render -noreset" node -e "$SMOKE"; then
            echo "::warning::Prebuilt gl failed to initialize; rebuilding from source."
            npm rebuild gl --build-from-source
            xvfb-run -a --server-args="-screen 0 1024x768x24 +extension GLX +render -noreset" node -e "$SMOKE"
          fi

      - name: Restore Test Models Cache
        id: cache-test-models
        uses: actions/cache@v4
        with:
          path: test-models
          key: ${{ runner.os }}-test-models-${{ needs.run-ifc-regression.outputs.test_models_sha }}

      - name: Checkout Test Models Repo if Not Cached
        if: steps.cache-test-models.outputs.cache-hit != 'true'
        run: |
          SHA="${{ needs.run-ifc-regression.outputs.test_models_sha }}"
          # Same exact commit run-ifc-regression diffed against (fetch-by-SHA).
          git init test-models
          git -C test-models remote add origin https://github.com/bldrs-ai/test-models.git
          git -C test-models fetch --depth 1 origin "$SHA"
          git -C test-models checkout "$SHA"

      - name: Run H3 benchmark (public)
        env:
          # Keep outputs OUT of the test-models checkout: it contains
          # committed benchmark snapshot CSVs, and reporting used to pick
          # those up instead of this run's results.
          BENCHMARK_OUTPUT_DIR: ${{ runner.temp }}/bench-public
        run: |
          xvfb-run -a --server-args="-screen 0 1024x768x24 +extension GLX +render -noreset" \
            node scripts/benchmark.cjs ./h3 ./test-models

      - name: Locate detail CSV
        id: detail
        run: |
          # benchmark.cjs writes to $BENCHMARK_OUTPUT_DIR/<engine>_<modelDirName>/performance-detail.csv
          CSV=$(find "${{ runner.temp }}/bench-public" -name performance-detail.csv -type f | head -1)
          test -n "$CSV" || { echo "::error::performance-detail.csv not produced"; exit 1; }
          echo "csv=${CSV}" >> "$GITHUB_OUTPUT"

      - name: Build perf table (all models, alpha sort)
        id: table
        env:
          CSV_PATH: ${{ steps.detail.outputs.csv }}
        run: |
          TABLE=$(python - "$CSV_PATH" <<'EOF'
          import csv, os, sys
          rows = list(csv.DictReader(open(sys.argv[1])))
          if not rows:
              print("performance-detail.csv is empty.")
              sys.exit(0)
          rows.sort(key=lambda r: r.get('filename',''))
          cols = ['filename','loadStatus','schemaVersion','parseTimeMs','geometryTimeMs','totalTimeMs','rssMb']
          print("| " + " | ".join(cols) + " |")
          print("|" + " --- |" * len(cols))
          for r in rows:
              print("| " + " | ".join(str(r.get(c,'')) for c in cols) + " |")
          print("")
          print(f"_Total: {len(rows)} models._")
          EOF
          )
          {
            echo "table<<EOF"
            echo "$TABLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload public perf detail CSV
        uses: actions/upload-artifact@v4
        with:
          name: perf-three-public-${{ github.run_id }}
          path: ${{ steps.detail.outputs.csv }}

      # Full bench output (per-model PNGs, 00-rendering-server.log.txt) even —
      # especially — when the benchmark fails, so render failures are
      # diagnosable from the artifact instead of being lost with the runner.
      - name: Upload bench output (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-three-public-benchdir-${{ github.run_id }}
          path: ${{ runner.temp }}/bench-public
          if-no-files-found: ignore

      # --- Cross-version delta vs the most recent prior push:main run ---
      # See .github/actions/perf-delta for the shared find/download/compute/
      # upload pipeline. Non-fatal: if anything goes wrong (no prior, expired,
      # format change, script error), the delta section is omitted from the
      # comment and the snapshot still posts.
      - name: Compute public perf delta
        id: perf_delta
        uses: ./.github/actions/perf-delta
        with:
          artifact-prefix: 'perf-three-public-'
          current-csv: ${{ steps.detail.outputs.csv }}
          delta-artifact-name: perf-delta-public-${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build delta section (sorted by abs %change)
        id: delta_table
        if: steps.perf_delta.outputs.csv != ''
        env:
          DELTA_CSV: ${{ steps.perf_delta.outputs.csv }}
          PREV_RUN_ID: ${{ steps.perf_delta.outputs.prev_run_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SECTION=$(python - "$DELTA_CSV" "$PREV_RUN_ID" "$RUN_ID" <<'EOF'
          import csv, sys
          delta_csv, prev_run_id, run_id = sys.argv[1], sys.argv[2], sys.argv[3]
          def pct(s):
              s = (s or '').strip().rstrip('%')
              if s == '' or s == 'Infinity' or s == 'N/A': return float('inf') if s == 'Infinity' else 0.0
              try: return float(s)
              except ValueError: return 0.0
          rows = list(csv.DictReader(open(delta_csv)))
          if not rows:
              sys.exit(0)
          rows.sort(key=lambda r: abs(pct(r.get('totalTimeMsPercentageChange',''))), reverse=True)
          cols = ['filename','engine1TotalTimeMs','engine2TotalTimeMs','totalTimeMsDelta','totalTimeMsPercentageChange']
          headers = ['file','prev ms','curr ms','Δ ms','Δ %']
          print(f"### Δ vs previous run [#{prev_run_id}](https://github.com/bldrs-ai/conway/actions/runs/{prev_run_id})")
          print()
          print("| " + " | ".join(headers) + " |")
          print("|" + " --- |" * len(headers))
          for r in rows:
              print("| " + " | ".join(str(r.get(c,'')) for c in cols) + " |")
          print()
          print(f"_Δ rows: {len(rows)} (sorted by |Δ %| desc). Negative = improvement._")
          print(f"_Delta CSV in run artifacts (`perf-delta-public-{run_id}`)._")
          EOF
          )
          {
            echo "section<<EOF"
            echo "$SECTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Parse PR# from the merge commit message — same trick auto-publish uses.
      # Squash-merge embeds it as "... (#N)", merge commit as "Merge pull
      # request #N from ...". If no PR# parses, skip the comment (artifact is
      # still uploaded for manual inspection).
      - name: Resolve PR number for comment target
        id: pr
        run: |
          MSG=$(git log -1 --format=%B HEAD)
          PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      # Look up an existing perf comment by hidden marker and upsert. Without
      # this, every re-run of push:main would post a new duplicate comment.
      - name: Find existing public perf comment
        id: find_comment
        if: steps.pr.outputs.number != ''
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- perf-three-public -->'

      - name: Create or update public perf comment
        if: steps.pr.outputs.number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.pr.outputs.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- perf-three-public -->
            ## Headless-three Performance (public models)

            **Setup**: conway `${{ needs.run-ifc-regression.outputs.package_tgz }}` against H3 `${{ env.H3_SHA }}` over `test-models@${{ needs.run-ifc-regression.outputs.test_models_sha }}`.

            ${{ steps.table.outputs.table }}

            ${{ steps.delta_table.outputs.section }}

            _Full `performance-detail.csv` in run artifacts (`perf-three-public-${{ github.run_id }}`)._

  # ---------------------------------------------------------------------------
  # Headless-three perf benchmark (private models).
  #
  # Same setup as perf-three-public but against bldrs-ai/test-models-private.
  # The comment posts only aggregate stats (count/min/median/mean/max/stddev
  # for parseTimeMs/geometryTimeMs/totalTimeMs) — no filenames — so the
  # public PR thread doesn't leak private model identifiers. The detail CSV
  # is uploaded as an artifact whose visibility follows the repo (private).
  #
  # Fail-fast on missing TEST_MODELS_PRIVATE_TOKEN: surfaces config problems
  # immediately instead of silently skipping coverage.
  # ---------------------------------------------------------------------------
  perf-three-private:
    needs: run-ifc-regression
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' || github.head_ref == 'claude/fix-perf-three-gl'  # TEMP: validate perf jobs on this PR; revert before merge
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      actions: read    # required by download-artifact@v4 to fetch from prior runs
    env:
      H3_SHA: ${{ vars.H3_SHA || '76f9ab686e08e58e7fe798e6a11ed0ad52b38c4b' }}
      # Default to main; override via repo variable once a stable tag exists.
      TEST_MODELS_PRIVATE_TAG: ${{ vars.TEST_MODELS_PRIVATE_TAG || 'main' }}
    steps:
      - name: Fail fast if private models token missing
        env:
          TOKEN_PRESENT: ${{ secrets.TEST_MODELS_PRIVATE_TOKEN != '' }}
        run: |
          if [ "$TOKEN_PRESENT" != "true" ]; then
            echo "::error::TEST_MODELS_PRIVATE_TOKEN secret is not set. Required to clone bldrs-ai/test-models-private."
            exit 1
          fi

      - name: Checkout conway (for scripts/benchmark.cjs)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download conway candidate tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-ifc-regression.outputs.package_tgz }}
          path: artifacts

      - name: Clone headless-three at pinned SHA
        run: |
          git clone https://github.com/bldrs-ai/headless-three.git h3
          git -C h3 checkout "$H3_SHA"

      - name: Override conway via yarn resolutions
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          test -f "$CANDIDATE_TGZ" || { echo "::error::Candidate tarball missing: $CANDIDATE_TGZ"; exit 1; }
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('h3/package.json', 'utf8'));
            p.resolutions = Object.assign({}, p.resolutions, { '@bldrs-ai/conway': 'file:' + process.env.CANDIDATE_TGZ });
            fs.writeFileSync('h3/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install H3 + build
        working-directory: h3
        run: |
          yarn install
          yarn build
          # The bundled server resolves the conway wasm from <cwd>/Dist at
          # runtime; without this every render 500s with ERR_MODULE_NOT_FOUND.
          ln -sfn node_modules/@bldrs-ai/conway/compiled/dependencies/conway-geom/Dist Dist

      - name: Verify candidate conway is resolved in H3
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          EXPECTED=$(tar -xzOf "$CANDIDATE_TGZ" package/package.json | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>console.log(JSON.parse(s).version))")
          ACTUAL=$(node -p "require('./h3/node_modules/@bldrs-ai/conway/package.json').version")
          echo "Expected conway: $EXPECTED"
          echo "Actual conway:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::yarn resolutions override did not take effect. Expected '$EXPECTED', got '$ACTUAL'."
            exit 1
          fi

      # headless-gl needs an X/GLX display + GL libraries; see the public
      # perf job for details.
      - name: Install Xvfb + GL libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q xvfb pkg-config build-essential \
            libxi-dev libglu1-mesa-dev libglew-dev

      - name: GL smoke test (rebuild gl from source if prebuilt is broken)
        working-directory: h3
        run: |
          SMOKE='const gl=require("gl")(8,8); if(!gl){throw new Error("gl context creation returned null")}; console.log("gl OK:", gl.getParameter(gl.VERSION))'
          if ! xvfb-run -a --server-args="-screen 0 1024x768x24 +extension GLX +render -noreset" node -e "$SMOKE"; then
            echo "::warning::Prebuilt gl failed to initialize; rebuilding from source."
            npm rebuild gl --build-from-source
            xvfb-run -a --server-args="-screen 0 1024x768x24 +extension GLX +render -noreset" node -e "$SMOKE"
          fi

      - name: Clone private test models
        env:
          GH_TOKEN: ${{ secrets.TEST_MODELS_PRIVATE_TOKEN }}
        run: |
          git clone --depth 1 --branch "$TEST_MODELS_PRIVATE_TAG" \
            "https://x-access-token:${GH_TOKEN}@github.com/bldrs-ai/test-models-private.git" test-models-private

      - name: Run H3 benchmark (private)
        env:
          # Keep outputs OUT of the model checkout (it may contain committed
          # benchmark snapshot CSVs that reporting would pick up instead).
          BENCHMARK_OUTPUT_DIR: ${{ runner.temp }}/bench-private
        run: |
          xvfb-run -a --server-args="-screen 0 1024x768x24 +extension GLX +render -noreset" \
            node scripts/benchmark.cjs ./h3 ./test-models-private

      - name: Locate detail CSV
        id: detail
        run: |
          CSV=$(find "${{ runner.temp }}/bench-private" -name performance-detail.csv -type f | head -1)
          test -n "$CSV" || { echo "::error::performance-detail.csv not produced"; exit 1; }
          echo "csv=${CSV}" >> "$GITHUB_OUTPUT"

      - name: Build aggregate stats (no filenames)
        id: stats
        env:
          CSV_PATH: ${{ steps.detail.outputs.csv }}
        run: |
          STATS=$(python - "$CSV_PATH" <<'EOF'
          import csv, statistics, sys
          rows = list(csv.DictReader(open(sys.argv[1])))
          total = len(rows)
          # Treat any loadStatus other than 'ok' (case-insensitive) as failing.
          ok_rows = [r for r in rows if (r.get('loadStatus','').strip().lower() == 'ok')]
          fail = total - len(ok_rows)
          def col_stats(col):
              vals = []
              for r in ok_rows:
                  v = r.get(col, '')
                  try:
                      vals.append(float(v))
                  except (TypeError, ValueError):
                      pass
              if not vals:
                  return {'count': '0', 'min': '-', 'median': '-', 'mean': '-', 'max': '-', 'stddev': '-'}
              return {
                  'count': str(len(vals)),
                  'min': f"{min(vals):.0f}",
                  'median': f"{statistics.median(vals):.0f}",
                  'mean': f"{statistics.mean(vals):.0f}",
                  'max': f"{max(vals):.0f}",
                  'stddev': f"{(statistics.stdev(vals) if len(vals) > 1 else 0):.0f}",
              }
          cols = ['parseTimeMs', 'geometryTimeMs', 'totalTimeMs']
          s = {c: col_stats(c) for c in cols}
          print(f"**Pass/fail**: {len(ok_rows)} passing / {fail} failing of {total} total.")
          print()
          print("| stat | " + " | ".join(cols) + " |")
          print("| --- |" + " --- |" * len(cols))
          for stat in ['count', 'min', 'median', 'mean', 'max', 'stddev']:
              print(f"| {stat} | " + " | ".join(s[c][stat] for c in cols) + " |")
          EOF
          )
          {
            echo "stats<<EOF"
            echo "$STATS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload private perf detail CSV
        uses: actions/upload-artifact@v4
        with:
          name: perf-three-private-${{ github.run_id }}
          path: ${{ steps.detail.outputs.csv }}

      # Server log + per-model outputs even when the benchmark fails, so
      # render failures are diagnosable. Private models: the log can contain
      # private filenames, but the artifact inherits the repo's access
      # control, same as the detail CSV above.
      - name: Upload bench output (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-three-private-benchdir-${{ github.run_id }}
          path: ${{ runner.temp }}/bench-private
          if-no-files-found: ignore

      # --- Cross-version delta vs previous push:main run ---
      # Mirrors the public-job logic but emits aggregate stats over the delta
      # columns (no filenames in the comment). The delta CSV itself contains
      # filenames and is uploaded as a collaborator-only artifact.
      - name: Compute private perf delta
        id: perf_delta
        uses: ./.github/actions/perf-delta
        with:
          artifact-prefix: 'perf-three-private-'
          current-csv: ${{ steps.detail.outputs.csv }}
          delta-artifact-name: perf-delta-private-${{ github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Aggregate-only stats over the delta columns — no filenames leak into
      # the comment body. Pct change is a string like "12.34%"; strip the
      # suffix for the numeric stats. Models present in only one side
      # contribute N/A delta values which parseValue() in gen_delta_csv
      # collapses to 0; we skip them here so the stats reflect real changes.
      - name: Build delta stats section
        id: delta_stats
        if: steps.perf_delta.outputs.csv != ''
        env:
          DELTA_CSV: ${{ steps.perf_delta.outputs.csv }}
          PREV_RUN_ID: ${{ steps.perf_delta.outputs.prev_run_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SECTION=$(python - "$DELTA_CSV" "$PREV_RUN_ID" "$RUN_ID" <<'EOF'
          import csv, statistics, sys
          delta_csv, prev_run_id, run_id = sys.argv[1], sys.argv[2], sys.argv[3]
          rows = list(csv.DictReader(open(delta_csv)))
          # Only models that ran successfully on BOTH sides have meaningful
          # numeric deltas. loadStatus1/2 are 'OK' (uppercase) from benchmark.cjs.
          common = [r for r in rows
                    if r.get('loadStatus1','').strip().upper() == 'OK'
                    and r.get('loadStatus2','').strip().upper() == 'OK']
          def parse_pct(s):
              s = (s or '').strip().rstrip('%')
              if s in ('', 'N/A', 'Infinity'): return None
              try: return float(s)
              except ValueError: return None
          def parse_num(s):
              s = (s or '').strip()
              if s in ('', 'N/A'): return None
              try: return float(s)
              except ValueError: return None
          def col_stats(label, vals, suffix=''):
              vals = [v for v in vals if v is not None]
              if not vals:
                  return {'count': '0', 'min': '-', 'median': '-', 'mean': '-', 'max': '-', 'stddev': '-'}
              # Match precision to the column's unit (% gets 2 decimals; ms is integer)
              # and use the same suffix so the cells in a column read uniformly.
              prec = 2 if suffix == '%' else 0
              signed = lambda v: f"{v:+.{prec}f}{suffix}"
              unsigned = lambda v: f"{v:.{prec}f}{suffix}"
              return {
                  'count': str(len(vals)),
                  'min': signed(min(vals)),
                  'median': signed(statistics.median(vals)),
                  'mean': signed(statistics.mean(vals)),
                  'max': signed(max(vals)),
                  'stddev': unsigned(statistics.stdev(vals) if len(vals) > 1 else 0),
              }
          parse_d  = col_stats('parseTimeMsDelta',   [parse_num(r.get('parseTimeMsDelta','')) for r in common])
          geom_d   = col_stats('geometryTimeMsDelta',[parse_num(r.get('geometryTimeMsDelta','')) for r in common])
          total_d  = col_stats('totalTimeMsDelta',   [parse_num(r.get('totalTimeMsDelta','')) for r in common])
          pct_d    = col_stats('pct',                [parse_pct(r.get('totalTimeMsPercentageChange','')) for r in common], suffix='%')
          # Track regressions/improvements at a glance.
          pct_vals = [parse_pct(r.get('totalTimeMsPercentageChange','')) for r in common]
          pct_vals = [v for v in pct_vals if v is not None]
          regr = sum(1 for v in pct_vals if v > 0)
          impr = sum(1 for v in pct_vals if v < 0)
          flat = sum(1 for v in pct_vals if v == 0)
          print(f"### Δ vs previous run [#{prev_run_id}](https://github.com/bldrs-ai/conway/actions/runs/{prev_run_id})")
          print()
          print(f"**Models compared (OK on both sides)**: {len(common)} of {len(rows)} delta rows.")
          print(f"**Regressed / improved / flat (by totalTimeMs)**: {regr} / {impr} / {flat}.")
          print()
          cols = ['parseTimeMsDelta','geometryTimeMsDelta','totalTimeMsDelta','totalTimeMsPercentageChange']
          headers = ['stat','Δ parse ms','Δ geom ms','Δ total ms','Δ total %']
          s = {'parseTimeMsDelta': parse_d, 'geometryTimeMsDelta': geom_d, 'totalTimeMsDelta': total_d, 'totalTimeMsPercentageChange': pct_d}
          print("| " + " | ".join(headers) + " |")
          print("|" + " --- |" * len(headers))
          for stat in ['count', 'min', 'median', 'mean', 'max', 'stddev']:
              print(f"| {stat} | " + " | ".join(s[c][stat] for c in cols) + " |")
          print()
          print(f"_Delta CSV in run artifacts (`perf-delta-private-{run_id}`, collaborator-only)._")
          EOF
          )
          {
            echo "section<<EOF"
            echo "$SECTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve PR number for comment target
        id: pr
        run: |
          MSG=$(git log -1 --format=%B HEAD)
          PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      # Look up an existing perf comment by hidden marker and upsert. Without
      # this, every re-run of push:main would post a new duplicate comment.
      - name: Find existing private perf comment
        id: find_comment
        if: steps.pr.outputs.number != ''
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- perf-three-private -->'

      - name: Create or update private perf comment
        if: steps.pr.outputs.number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.pr.outputs.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- perf-three-private -->
            ## Headless-three Performance (private models)

            **Setup**: conway `${{ needs.run-ifc-regression.outputs.package_tgz }}` against H3 `${{ env.H3_SHA }}` over `test-models-private@${{ env.TEST_MODELS_PRIVATE_TAG }}`.

            ${{ steps.stats.outputs.stats }}

            ${{ steps.delta_stats.outputs.section }}

            _Detail CSV in run artifacts (`perf-three-private-${{ github.run_id }}`, visible to repo collaborators only)._

  # ---------------------------------------------------------------------------
  # Continuous release: on every successful push to main, publish to npm and
  # tag the commit. Version is <major>.<PR>.<commit>:
  #   major  - first segment of package.json's version (manual bump). The
  #            minor/patch in package.json/version.ts are an unstamped 1.0.0
  #            placeholder on main and are ignored here - both are recomputed
  #            below, so only edit the major segment to roll a major version.
  #   PR     - PR number parsed from the merge commit message (#N)
  #   commit - 'git rev-list HEAD --count' at the merge commit
  # So every green merge ships a uniquely-traceable patch to @latest.
  #
  # Auth: npm Trusted Publishing via GitHub OIDC. The trusted publisher must
  # be configured on npmjs.com (Package → Settings → Trusted Publisher) and
  # bound to repo+workflow. No NPM_TOKEN secret needed.
  # ---------------------------------------------------------------------------
  auto-publish:
    needs: [build, run-ifc-regression]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    permissions:
      contents: write    # tag push
      id-token: write    # OIDC token for npm Trusted Publishing
    steps:
      - name: Checkout (full history for rev-list)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      # Trusted Publishing requires npm >= 11.5.1. Node 20 ships with npm 10.x,
      # so upgrade the global npm binary before the publish step.
      - name: Upgrade npm to a version that supports OIDC
        run: npm install -g npm@latest

      - name: Compute next version
        id: ver
        run: |
          MAJOR=$(node -p "require('./package.json').version.split('.')[0]")
          # PR number is parsed out of the merge commit message. Both
          # 'Merge pull request #N from ...' (merge commit) and
          # '... (#N)' (squash-merge) embed it. If the push wasn't via
          # PR merge, fall back to 0 - the version still publishes but
          # signals 'manual push, not PR-attached'.
          MSG=$(git log -1 --format=%B HEAD)
          PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          if [ -z "$PR_NUM" ]; then
            echo "::warning::Could not parse PR number from commit message; using 0."
            PR_NUM=0
          fi
          COMMIT=$(git rev-list HEAD --count)
          NEW_VERSION="${MAJOR}.${PR_NUM}.${COMMIT}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Auto-release version: ${NEW_VERSION}  (major=${MAJOR}, PR=${PR_NUM}, commit=${COMMIT})"

      - name: Stamp version into package.json + version.ts
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          perl -i -pe "s/(\"version\":\s*)\"[^\"]+\"/\$1\"$NEW_VERSION\"/" package.json
          perl -i -pe "s/Conway Web-Ifc Shim v[0-9]+\.[0-9]+\.[0-9]+/Conway Web-Ifc Shim v$NEW_VERSION/" src/version/version.ts

      - name: Compute conway-geom submodule SHA
        id: subsha
        run: echo "sha=$(git -C dependencies/conway-geom rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # WASM cache is populated by the build job earlier in this run.
      - name: Restore WASM build cache
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            dependencies/conway-geom/Dist
            dependencies/conway-geom/bin/release
            compiled/dependencies/conway-geom/Dist
          key: wasm-${{ runner.os }}-emsdk${{ env.EMSDK_VERSION }}-${{ steps.subsha.outputs.sha }}

      - name: Fail if WASM cache miss
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::WASM cache miss in auto-publish; build should have populated it."
          exit 1

      - name: TypeScript build
        run: yarn build-incremental

      - name: Bundle examples
        run: yarn bundle-examples

      # Publish BEFORE tagging. If publish fails, no stranded tag.
      # npm CLI 11.5.1+ picks up the OIDC token from GHA automatically.
      - name: Publish to npm
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # The version scheme is <major>.<PR#>.<commit-count>. The PR-number
          # segment is non-monotonic: when PRs merge out of order, a later main
          # commit can carry a *lower* PR number than the package currently
          # tagged `latest` (e.g. #345 merging right after #346). npm then
          # refuses to *implicitly* move `latest` onto the lower SemVer and
          # aborts the publish ("Cannot implicitly apply the latest tag ...").
          # The commit-count segment is strictly monotonic on main, so this
          # build genuinely supersedes `latest` even when its middle segment is
          # lower — pass `--tag latest` explicitly to override npm's guard and
          # keep `latest` pointing at the newest code. The in-order case (new
          # version is the higher SemVer) still takes the plain implicit path.
          CURRENT_LATEST=$(npm view @bldrs-ai/conway@latest version 2>/dev/null || echo '0.0.0')
          HIGHEST=$(printf '%s\n%s\n' "$CURRENT_LATEST" "$NEW_VERSION" | sort -V | tail -1)
          if [ "$NEW_VERSION" != "$CURRENT_LATEST" ] && [ "$HIGHEST" = "$NEW_VERSION" ]; then
            npm publish --access public
          else
            echo "::warning::Computed version ${NEW_VERSION} is not greater than current latest ${CURRENT_LATEST} (out-of-order PR merge); publishing with explicit --tag latest."
            npm publish --access public --tag latest
          fi

      # Idempotent tag: skip if already on origin (e.g. on a re-run).
      - name: Create and push tag
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if git ls-remote --tags origin "$NEW_VERSION" | grep -q "refs/tags/$NEW_VERSION$"; then
            echo "Tag $NEW_VERSION already exists on origin; skipping."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$NEW_VERSION" -m "Auto-release $NEW_VERSION"
          git push origin "$NEW_VERSION"
