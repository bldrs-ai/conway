name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

env:
  EMSDK_VERSION: '3.1.72'
  EMSDK_CACHE_FOLDER: 'cache/emsdk'
  TEST_MODELS_TAG: '0.13.802'

jobs:
  build:
    # Heavy runner matches ifc-regression. The WASM toolchain (genie +
    # emcc) needs the headroom; the default 2-vCPU runner fails the compile.
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Compute conway-geom submodule SHA
        id: subsha
        run: echo "sha=$(git -C dependencies/conway-geom rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # --- WASM cache: keyed on conway-geom submodule SHA + EMSDK version.
      # On hit, the heavy WASM build (GENie + EMSDK + emcc) is skipped entirely.
      # The regression job depends on this job and consumes the same cache.
      - name: Restore WASM build cache
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            dependencies/conway-geom/Dist
            dependencies/conway-geom/bin/release
            compiled/dependencies/conway-geom/Dist
          key: wasm-${{ runner.os }}-emsdk${{ env.EMSDK_VERSION }}-${{ steps.subsha.outputs.sha }}

      # --- GENie + EMSDK setup (skipped on WASM cache hit)
      - name: Restore GENie cache
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        id: genie-cache
        uses: actions/cache@v4
        with:
          path: bin/linux/genie
          key: genie-${{ runner.os }}

      - name: Build GENie
        if: steps.wasm-cache.outputs.cache-hit != 'true' && steps.genie-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/bkaradzic/GENie.git GENie
          (cd GENie && make)
          mkdir -p bin/linux
          cp GENie/bin/linux/genie bin/linux/genie

      - name: Cache Emscripten system libraries
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.EMSDK_CACHE_FOLDER }}
          key: ${{ env.EMSDK_VERSION }}-${{ runner.os }}

      - name: Install Emscripten
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSDK_VERSION }}
          actions-cache-folder: ${{ env.EMSDK_CACHE_FOLDER }}

      - name: Export EMSDK paths for subsequent steps
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          which em++
          em++ -v
          EMSDK=$(which em++ | sed 's|upstream/emscripten/em++||')
          EMSCRIPTEN=$(which em++ | sed 's|/em++||')
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EMSCRIPTEN=$EMSCRIPTEN" >> "$GITHUB_ENV"

      - name: Extract WASM build dependencies
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: yarn extract-wasm-dependencies

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: yarn build-GHA-all

      # tsc --build always runs from scratch here. Earlier we cached
      # compiled/src + compiled/examples + tsbuildinfo, but that subset
      # left compiled/dependencies/conway-geom/index.js missing — the
      # buildinfo claimed everything was up to date and tsc skipped
      # recompiling the conway-geom shim, so the test runner couldn't
      # resolve '../../dependencies/conway-geom/index.js'. A correct TS
      # cache strategy can come back as a separate iteration.
      - name: TypeScript build (incremental)
        run: yarn build-incremental

      - name: Test
        run: yarn test

      - name: Lint
        run: yarn lint

  # ---------------------------------------------------------------------------
  # Regression: consumes build's WASM cache (no rebuild). Posts results to PR.
  # Kept on a separate job (vs steps in build) so its 5-10 min runtime doesn't
  # block the build-job status from showing once the fast feedback finishes.
  # ---------------------------------------------------------------------------
  run-ifc-regression:
    needs: build
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    # Expose the packed tarball name so downstream perf jobs can download the
    # artifact by name without re-packing conway.
    outputs:
      package_tgz: ${{ steps.npm_pack.outputs.package_tgz }}
    steps:
      - name: Checkout Conway Repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Compute conway-geom submodule SHA
        id: subsha
        run: echo "sha=$(git -C dependencies/conway-geom rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Build job populated this cache. We expect a hit; if not, fail fast
      # rather than silently rebuilding WASM and confusing the timing model.
      - name: Restore WASM build cache (populated by build)
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            dependencies/conway-geom/Dist
            dependencies/conway-geom/bin/release
            compiled/dependencies/conway-geom/Dist
          key: wasm-${{ runner.os }}-emsdk${{ env.EMSDK_VERSION }}-${{ steps.subsha.outputs.sha }}

      - name: Fail if WASM cache miss
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::WASM cache miss in regression job; build should have populated it."
          exit 1

      - name: TypeScript build
        run: yarn build-incremental

      # Bump the minor version so the artifact tarball has a unique name
      # distinct from the released package (matches prior workflow behavior).
      - name: Bump minor for artifact naming
        run: yarn bumpMinor

      - name: Bundle examples
        run: yarn bundle-examples

      # --- Test Models Checkout & Regression ---
      - name: Restore Test Models Cache
        id: cache-test-models
        uses: actions/cache@v4
        with:
          path: test-models
          key: ${{ runner.os }}-test-models-${{ env.TEST_MODELS_TAG }}

      - name: Checkout Test Models Repo if Not Cached
        if: steps.cache-test-models.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.TEST_MODELS_TAG }} https://github.com/bldrs-ai/test-models.git test-models

      # Perf CSV lands OUTSIDE the diffed test_models folder so machine-specific
      # timings don't show up as "changes" against test-models's checked-in
      # baselines. The aggregate is uploaded as a workflow artifact below and
      # summarised in the PR comment.
      - name: Run IFC Regression Batch Script
        run: |
          node --experimental-specifier-resolution=node ./compiled/src/ifc/ifc_regression_batch_main.js \
            -e "sp-.*\.ifc" \
            -t ${{ env.TEST_MODELS_TAG }} \
            --perf "${GITHUB_WORKSPACE}/perf.csv" \
            test-models \
            test-models/regression/test_models \
            --parallel --mem-utilization 90

      - name: Gather Regression Results
        id: regression_results
        run: |
          cd test-models/regression/test_models

          # Process failed.csv with Python CSV parsing
          if [ -f failed.csv ]; then
            FAILED_OUTPUT=$(python - <<'EOF'
          import csv
          with open('failed.csv', newline='') as csvfile:
              reader = list(csv.reader(csvfile))
          if len(reader) <= 1:
              print("No failures :white_check_mark:")
          else:
              header = reader[0]
              header_line = "| " + " | ".join(header) + " |"
              separator_line = "|" + " --- |" * len(header)
              print(header_line)
              print(separator_line)
              for row in reader[1:]:
                sanitized_row = [field.replace("\n", " ").replace("\r", " ") for field in row]
                print("| " + " | ".join(sanitized_row) + " |")
          EOF
          )
          else
            FAILED_OUTPUT="No failed.csv found."
          fi

          # Process errors.csv with Python CSV parsing
          if [ -f errors.csv ]; then
            ERRORS_OUTPUT=$(python - <<'EOF'
          import csv
          with open('errors.csv', newline='') as csvfile:
              reader = list(csv.reader(csvfile))
          if len(reader) <= 1:
              print("No errors found.")
          else:
              header = reader[0]
              header_line = "| " + " | ".join(header) + " |"
              separator_line = "|" + " --- |" * len(header)
              print(header_line)
              print(separator_line)
              for row in reader[1:]:
                sanitized_row = [field.replace("\n", " ").replace("\r", " ") for field in row]
                print("| " + " | ".join(sanitized_row) + " |")
          EOF
          )
          else
            ERRORS_OUTPUT="No errors.csv found."
          fi

          echo "failed_output<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "errors_output<<EOF" >> $GITHUB_OUTPUT
          echo "$ERRORS_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Summarise the top-10 slowest models from the perf CSV. The full
          # CSV is uploaded as an artifact for finer inspection.
          PERF_CSV="${GITHUB_WORKSPACE}/perf.csv"
          if [ -f "$PERF_CSV" ]; then
            PERF_OUTPUT=$(python - "$PERF_CSV" <<'EOF'
          import csv, sys
          with open(sys.argv[1], newline='') as f:
              rows = list(csv.DictReader(f))
          if not rows:
              print("perf.csv is empty.")
          else:
              top_n = 10
              def total(r):
                  try: return int(r.get('totalTimeMs','0') or 0)
                  except ValueError: return 0
              rows.sort(key=total, reverse=True)
              header = ['file','status','parseTimeMs','geometryTimeMs','totalTimeMs','rssMb','heapUsedMb']
              print("| " + " | ".join(header) + " |")
              print("|" + " --- |" * len(header))
              for r in rows[:top_n]:
                  print("| " + " | ".join(r.get(h,'') for h in header) + " |")
              print("")
              print(f"_Showing top {min(top_n,len(rows))} of {len(rows)} models by totalTimeMs. Full CSV in the run artifacts._")
          EOF
          )
          else
            PERF_OUTPUT="perf.csv not produced."
          fi

          echo "perf_output<<EOF" >> $GITHUB_OUTPUT
          echo "$PERF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create NPM Package
        id: npm_pack
        run: |
          PACKAGE_TGZ=$(npm pack 2>&1 | grep "filename:" | sed 's/.*filename: //')
          echo "PACKAGE_TGZ=${PACKAGE_TGZ}" >> $GITHUB_ENV
          echo "package_tgz=${PACKAGE_TGZ}" >> $GITHUB_OUTPUT

      - name: Upload NPM Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.npm_pack.outputs.package_tgz }}
          path: ${{ steps.npm_pack.outputs.package_tgz }}

      - name: Upload perf.csv artifact
        if: ${{ hashFiles('perf.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-${{ github.run_id }}
          path: perf.csv

      - name: Comment on Pull Request with Regression Results and NPM Package Artifact
        if: ${{ github.event_name == 'pull_request' }}
        uses: peter-evans/create-or-update-comment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## IFC Regression Results

            **Failed.csv:**
            ${{ steps.regression_results.outputs.failed_output }}

            **Errors.csv:**
            ${{ steps.regression_results.outputs.errors_output }}

            **Performance (top 10 by totalTimeMs):**
            ${{ steps.regression_results.outputs.perf_output }}

            **NPM Package Artifact:**
            The package **${{ steps.npm_pack.outputs.package_tgz }}** was generated.
            Download it from [this run's artifacts page](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            (look for the artifact named **${{ steps.npm_pack.outputs.package_tgz }}**).

  # ---------------------------------------------------------------------------
  # Headless-three perf benchmark (public models).
  #
  # Runs scripts/benchmark.cjs against bldrs-ai/test-models (public) using the
  # candidate conway tarball produced by run-ifc-regression. The adapter
  # (@bldrs-ai/conway-web-ifc-adapter) ships unbundled — it does runtime
  # `import '@bldrs-ai/conway'` — so a yarn `resolutions` override in H3's
  # package.json forces the entire chain (H3 → adapter → conway) onto our
  # candidate without rebuilding the adapter.
  #
  # Info-only: results are posted as a PR comment for visibility. Future
  # iterations will diff perf vs a golden baseline and may gate on it.
  # ---------------------------------------------------------------------------
  perf-three-public:
    needs: run-ifc-regression
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    # Full set locally takes ~10 min; H3 build + clone adds ~5-10 min. Cap at
    # 60 to bound runner-minute cost on a hung benchmark.
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    env:
      # Pinned to a SHA so perf is reproducible. Override via repo variable
      # `H3_SHA` when bumping the H3 baseline.
      H3_SHA: ${{ vars.H3_SHA || '76f9ab686e08e58e7fe798e6a11ed0ad52b38c4b' }}
    steps:
      - name: Checkout conway (for scripts/benchmark.cjs)
        uses: actions/checkout@v4
        with:
          # No submodules — perf doesn't build conway, it consumes the tarball.
          submodules: false
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download conway candidate tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-ifc-regression.outputs.package_tgz }}
          path: artifacts

      - name: Clone headless-three at pinned SHA
        run: |
          git clone https://github.com/bldrs-ai/headless-three.git h3
          git -C h3 checkout "$H3_SHA"

      - name: Override conway via yarn resolutions
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          test -f "$CANDIDATE_TGZ" || { echo "::error::Candidate tarball missing: $CANDIDATE_TGZ"; exit 1; }
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('h3/package.json', 'utf8'));
            p.resolutions = Object.assign({}, p.resolutions, { '@bldrs-ai/conway': 'file:' + process.env.CANDIDATE_TGZ });
            fs.writeFileSync('h3/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install H3 + build
        working-directory: h3
        run: |
          yarn install
          yarn build

      # Safety check: if the resolutions override didn't take effect, H3 would
      # silently benchmark whatever conway version its lockfile pins instead of
      # our candidate. Compare the version in node_modules against the version
      # baked into the candidate tarball's package.json.
      - name: Verify candidate conway is resolved in H3
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          EXPECTED=$(tar -xzOf "$CANDIDATE_TGZ" package/package.json | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>console.log(JSON.parse(s).version))")
          ACTUAL=$(node -p "require('./h3/node_modules/@bldrs-ai/conway/package.json').version")
          echo "Expected conway: $EXPECTED"
          echo "Actual conway:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::yarn resolutions override did not take effect. Expected '$EXPECTED', got '$ACTUAL'."
            exit 1
          fi

      - name: Restore Test Models Cache
        id: cache-test-models
        uses: actions/cache@v4
        with:
          path: test-models
          key: ${{ runner.os }}-test-models-${{ env.TEST_MODELS_TAG }}

      - name: Checkout Test Models Repo if Not Cached
        if: steps.cache-test-models.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.TEST_MODELS_TAG }} https://github.com/bldrs-ai/test-models.git test-models

      - name: Run H3 benchmark (public)
        env:
          EXCLUDE_FILENAMES: "sp-946MB.ifc"
        run: |
          node scripts/benchmark.cjs ./h3 ./test-models

      - name: Locate detail CSV
        id: detail
        run: |
          # benchmark.cjs writes to <modelDir>/benchmarks/<engine>_<modelDirName>/performance-detail.csv
          CSV=$(find test-models/benchmarks -name performance-detail.csv -type f | head -1)
          test -n "$CSV" || { echo "::error::performance-detail.csv not produced"; exit 1; }
          echo "csv=${CSV}" >> "$GITHUB_OUTPUT"

      - name: Build perf table (all models, alpha sort)
        id: table
        env:
          CSV_PATH: ${{ steps.detail.outputs.csv }}
        run: |
          TABLE=$(python - "$CSV_PATH" <<'EOF'
          import csv, os, sys
          rows = list(csv.DictReader(open(sys.argv[1])))
          if not rows:
              print("performance-detail.csv is empty.")
              sys.exit(0)
          rows.sort(key=lambda r: r.get('filename',''))
          cols = ['filename','loadStatus','schemaVersion','parseTimeMs','geometryTimeMs','totalTimeMs','rssMb']
          print("| " + " | ".join(cols) + " |")
          print("|" + " --- |" * len(cols))
          for r in rows:
              print("| " + " | ".join(str(r.get(c,'')) for c in cols) + " |")
          print("")
          print(f"_Total: {len(rows)} models._")
          EOF
          )
          {
            echo "table<<EOF"
            echo "$TABLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload public perf detail CSV
        uses: actions/upload-artifact@v4
        with:
          name: perf-three-public-${{ github.run_id }}
          path: ${{ steps.detail.outputs.csv }}

      # Parse PR# from the merge commit message — same trick auto-publish uses.
      # Squash-merge embeds it as "... (#N)", merge commit as "Merge pull
      # request #N from ...". If no PR# parses, skip the comment (artifact is
      # still uploaded for manual inspection).
      - name: Resolve PR number for comment target
        id: pr
        run: |
          MSG=$(git log -1 --format=%B HEAD)
          PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Comment on merged PR
        if: steps.pr.outputs.number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            <!-- perf-three-public -->
            ## Headless-three Performance (public models)

            **Setup**: conway `${{ needs.run-ifc-regression.outputs.package_tgz }}` against H3 `${{ env.H3_SHA }}` over `test-models@${{ env.TEST_MODELS_TAG }}`.

            ${{ steps.table.outputs.table }}

            _Full `performance-detail.csv` in run artifacts (`perf-three-public-${{ github.run_id }}`)._

  # ---------------------------------------------------------------------------
  # Headless-three perf benchmark (private models).
  #
  # Same setup as perf-three-public but against bldrs-ai/test-models-private.
  # The comment posts only aggregate stats (count/min/median/mean/max/stddev
  # for parseTimeMs/geometryTimeMs/totalTimeMs) — no filenames — so the
  # public PR thread doesn't leak private model identifiers. The detail CSV
  # is uploaded as an artifact whose visibility follows the repo (private).
  #
  # Fail-fast on missing TEST_MODELS_PRIVATE_TOKEN: surfaces config problems
  # immediately instead of silently skipping coverage.
  # ---------------------------------------------------------------------------
  perf-three-private:
    needs: run-ifc-regression
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    env:
      H3_SHA: ${{ vars.H3_SHA || '76f9ab686e08e58e7fe798e6a11ed0ad52b38c4b' }}
      # Default to main; override via repo variable once a stable tag exists.
      TEST_MODELS_PRIVATE_TAG: ${{ vars.TEST_MODELS_PRIVATE_TAG || 'main' }}
    steps:
      - name: Fail fast if private models token missing
        env:
          TOKEN_PRESENT: ${{ secrets.TEST_MODELS_PRIVATE_TOKEN != '' }}
        run: |
          if [ "$TOKEN_PRESENT" != "true" ]; then
            echo "::error::TEST_MODELS_PRIVATE_TOKEN secret is not set. Required to clone bldrs-ai/test-models-private."
            exit 1
          fi

      - name: Checkout conway (for scripts/benchmark.cjs)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download conway candidate tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-ifc-regression.outputs.package_tgz }}
          path: artifacts

      - name: Clone headless-three at pinned SHA
        run: |
          git clone https://github.com/bldrs-ai/headless-three.git h3
          git -C h3 checkout "$H3_SHA"

      - name: Override conway via yarn resolutions
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          test -f "$CANDIDATE_TGZ" || { echo "::error::Candidate tarball missing: $CANDIDATE_TGZ"; exit 1; }
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('h3/package.json', 'utf8'));
            p.resolutions = Object.assign({}, p.resolutions, { '@bldrs-ai/conway': 'file:' + process.env.CANDIDATE_TGZ });
            fs.writeFileSync('h3/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Install H3 + build
        working-directory: h3
        run: |
          yarn install
          yarn build

      - name: Verify candidate conway is resolved in H3
        env:
          CANDIDATE_TGZ: ${{ github.workspace }}/artifacts/${{ needs.run-ifc-regression.outputs.package_tgz }}
        run: |
          EXPECTED=$(tar -xzOf "$CANDIDATE_TGZ" package/package.json | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>console.log(JSON.parse(s).version))")
          ACTUAL=$(node -p "require('./h3/node_modules/@bldrs-ai/conway/package.json').version")
          echo "Expected conway: $EXPECTED"
          echo "Actual conway:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::yarn resolutions override did not take effect. Expected '$EXPECTED', got '$ACTUAL'."
            exit 1
          fi

      - name: Clone private test models
        env:
          GH_TOKEN: ${{ secrets.TEST_MODELS_PRIVATE_TOKEN }}
        run: |
          git clone --depth 1 --branch "$TEST_MODELS_PRIVATE_TAG" \
            "https://x-access-token:${GH_TOKEN}@github.com/bldrs-ai/test-models-private.git" test-models-private

      - name: Run H3 benchmark (private)
        env:
          EXCLUDE_FILENAMES: "sp-946MB.ifc"
        run: |
          node scripts/benchmark.cjs ./h3 ./test-models-private

      - name: Locate detail CSV
        id: detail
        run: |
          CSV=$(find test-models-private/benchmarks -name performance-detail.csv -type f | head -1)
          test -n "$CSV" || { echo "::error::performance-detail.csv not produced"; exit 1; }
          echo "csv=${CSV}" >> "$GITHUB_OUTPUT"

      - name: Build aggregate stats (no filenames)
        id: stats
        env:
          CSV_PATH: ${{ steps.detail.outputs.csv }}
        run: |
          STATS=$(python - "$CSV_PATH" <<'EOF'
          import csv, statistics, sys
          rows = list(csv.DictReader(open(sys.argv[1])))
          total = len(rows)
          # Treat any loadStatus other than 'ok' (case-insensitive) as failing.
          ok_rows = [r for r in rows if (r.get('loadStatus','').strip().lower() == 'ok')]
          fail = total - len(ok_rows)
          def col_stats(col):
              vals = []
              for r in ok_rows:
                  v = r.get(col, '')
                  try:
                      vals.append(float(v))
                  except (TypeError, ValueError):
                      pass
              if not vals:
                  return {'count': '0', 'min': '-', 'median': '-', 'mean': '-', 'max': '-', 'stddev': '-'}
              return {
                  'count': str(len(vals)),
                  'min': f"{min(vals):.0f}",
                  'median': f"{statistics.median(vals):.0f}",
                  'mean': f"{statistics.mean(vals):.0f}",
                  'max': f"{max(vals):.0f}",
                  'stddev': f"{(statistics.stdev(vals) if len(vals) > 1 else 0):.0f}",
              }
          cols = ['parseTimeMs', 'geometryTimeMs', 'totalTimeMs']
          s = {c: col_stats(c) for c in cols}
          print(f"**Pass/fail**: {len(ok_rows)} passing / {fail} failing of {total} total.")
          print()
          print("| stat | " + " | ".join(cols) + " |")
          print("| --- |" + " --- |" * len(cols))
          for stat in ['count', 'min', 'median', 'mean', 'max', 'stddev']:
              print(f"| {stat} | " + " | ".join(s[c][stat] for c in cols) + " |")
          EOF
          )
          {
            echo "stats<<EOF"
            echo "$STATS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload private perf detail CSV
        uses: actions/upload-artifact@v4
        with:
          name: perf-three-private-${{ github.run_id }}
          path: ${{ steps.detail.outputs.csv }}

      - name: Resolve PR number for comment target
        id: pr
        run: |
          MSG=$(git log -1 --format=%B HEAD)
          PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Comment on merged PR
        if: steps.pr.outputs.number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            <!-- perf-three-private -->
            ## Headless-three Performance (private models)

            **Setup**: conway `${{ needs.run-ifc-regression.outputs.package_tgz }}` against H3 `${{ env.H3_SHA }}` over `test-models-private@${{ env.TEST_MODELS_PRIVATE_TAG }}`.

            ${{ steps.stats.outputs.stats }}

            _Detail CSV in run artifacts (`perf-three-private-${{ github.run_id }}`, visible to repo collaborators only)._

  # ---------------------------------------------------------------------------
  # Continuous release: on every successful push to main, publish to npm and
  # tag the commit. Version is <major>.<PR>.<commit>:
  #   major  - first segment of package.json's version (manual bump)
  #   PR     - PR number parsed from the merge commit message (#N)
  #   commit - 'git rev-list HEAD --count' at the merge commit
  # So every green merge ships a uniquely-traceable patch to @latest.
  #
  # Auth: npm Trusted Publishing via GitHub OIDC. The trusted publisher must
  # be configured on npmjs.com (Package → Settings → Trusted Publisher) and
  # bound to repo+workflow. No NPM_TOKEN secret needed.
  # ---------------------------------------------------------------------------
  auto-publish:
    needs: [build, run-ifc-regression]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    permissions:
      contents: write    # tag push
      id-token: write    # OIDC token for npm Trusted Publishing
    steps:
      - name: Checkout (full history for rev-list)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      # Trusted Publishing requires npm >= 11.5.1. Node 20 ships with npm 10.x,
      # so upgrade the global npm binary before the publish step.
      - name: Upgrade npm to a version that supports OIDC
        run: npm install -g npm@latest

      - name: Compute next version
        id: ver
        run: |
          MAJOR=$(node -p "require('./package.json').version.split('.')[0]")
          # PR number is parsed out of the merge commit message. Both
          # 'Merge pull request #N from ...' (merge commit) and
          # '... (#N)' (squash-merge) embed it. If the push wasn't via
          # PR merge, fall back to 0 - the version still publishes but
          # signals 'manual push, not PR-attached'.
          MSG=$(git log -1 --format=%B HEAD)
          PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          if [ -z "$PR_NUM" ]; then
            echo "::warning::Could not parse PR number from commit message; using 0."
            PR_NUM=0
          fi
          COMMIT=$(git rev-list HEAD --count)
          NEW_VERSION="${MAJOR}.${PR_NUM}.${COMMIT}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Auto-release version: ${NEW_VERSION}  (major=${MAJOR}, PR=${PR_NUM}, commit=${COMMIT})"

      - name: Stamp version into package.json + version.ts
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          perl -i -pe "s/(\"version\":\s*)\"[^\"]+\"/\$1\"$NEW_VERSION\"/" package.json
          perl -i -pe "s/Conway Web-Ifc Shim v[0-9]+\.[0-9]+\.[0-9]+/Conway Web-Ifc Shim v$NEW_VERSION/" src/version/version.ts

      - name: Compute conway-geom submodule SHA
        id: subsha
        run: echo "sha=$(git -C dependencies/conway-geom rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # WASM cache is populated by the build job earlier in this run.
      - name: Restore WASM build cache
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            dependencies/conway-geom/Dist
            dependencies/conway-geom/bin/release
            compiled/dependencies/conway-geom/Dist
          key: wasm-${{ runner.os }}-emsdk${{ env.EMSDK_VERSION }}-${{ steps.subsha.outputs.sha }}

      - name: Fail if WASM cache miss
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::WASM cache miss in auto-publish; build should have populated it."
          exit 1

      - name: TypeScript build
        run: yarn build-incremental

      - name: Bundle examples
        run: yarn bundle-examples

      # Publish BEFORE tagging. If publish fails, no stranded tag.
      # npm CLI 11.5.1+ picks up the OIDC token from GHA automatically.
      - name: Publish to npm
        run: npm publish --access public

      # Idempotent tag: skip if already on origin (e.g. on a re-run).
      - name: Create and push tag
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if git ls-remote --tags origin "$NEW_VERSION" | grep -q "refs/tags/$NEW_VERSION$"; then
            echo "Tag $NEW_VERSION already exists on origin; skipping."
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$NEW_VERSION" -m "Auto-release $NEW_VERSION"
          git push origin "$NEW_VERSION"
